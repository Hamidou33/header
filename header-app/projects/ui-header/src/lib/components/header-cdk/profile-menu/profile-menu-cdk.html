<div class="profile-section">
  <button
    class="profile-button"
    [cdkMenuTriggerFor]="menu"
    aria-label="Profile menu">
    <span class="profile-avatar">{{ user().avatar }}</span>
    <div class="profile-info">
      <span class="profile-name">{{ user().name }}</span>
      <span class="profile-email">{{ user().email }}</span>
    </div>
    <svg
      class="arrow-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </button>

  <ng-template #menu>
    <div class="profile-menu" cdkMenu>
      <div class="profile-menu-header">
        <span class="profile-menu-avatar">{{ user().avatar }}</span>
        <div class="profile-menu-info">
          <strong class="profile-menu-name">{{ user().name }}</strong>
          <span class="profile-menu-email">{{ user().email }}</span>
        </div>
      </div>
      <div class="profile-menu-divider"></div>
      @for (item of menuItems(); track $index) {
        @if (item.subMenu) {
          <div class="profile-menu-item-container">
            <button
              class="profile-menu-item"
              [cdkMenuTriggerFor]="submenu"
              cdkMenuItem>
              <span class="profile-menu-icon">{{ item.icon }}</span>
              <span>{{ item.label }}</span>
              <svg
                class="arrow-icon-right"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>

            <ng-template #submenu>
              <div class="profile-submenu" cdkMenu>
                @for (subItem of item.subMenu; track $index) {
                  <a
                    [href]="subItem.link"
                    class="profile-menu-item"
                    cdkMenuItem>
                    <span class="profile-menu-icon">{{ subItem.icon }}</span>
                    <span>{{ subItem.label }}</span>
                  </a>
                }
              </div>
            </ng-template>
          </div>
        } @else {
          <a
            [href]="item.link"
            class="profile-menu-item"
            cdkMenuItem>
            <span class="profile-menu-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        }
      }
    </div>
  </ng-template>
</div>
