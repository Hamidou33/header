@if (clickable()) {
  <button
    type="button"
    class="avatar-container"
    [class]="sizeClass()"
    [class.clickable]="clickable()"
    [attr.aria-label]="userName() ? 'Avatar of ' + userName() : 'Avatar'"
    data-testid="avatar-button"
    (click)="onAvatarClick()">
    @if (avatarUrl()) {
      <img [src]="avatarUrl()" [alt]="userName()" class="avatar-image" />
    } @else if (shouldShowInitials()) {
      <div class="avatar-initials">{{ initials() }}</div>
    } @else {
      <svg
        class="avatar-default-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor">
        <path
          d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
      </svg>
    }

    @if (showOnlineStatus()) {
      <span
        class="online-status"
        [class.online]="isOnline()"
        [class.offline]="!isOnline()"
        [attr.aria-label]="isOnline() ? 'Online' : 'Offline'"></span>
    }
  </button>
} @else {
  <div
    class="avatar-container"
    [class]="sizeClass()"
    [attr.aria-label]="userName() ? 'Avatar of ' + userName() : 'Avatar'"
    data-testid="avatar-static">
    @if (avatarUrl()) {
      <img [src]="avatarUrl()" [alt]="userName()" class="avatar-image" />
    } @else if (shouldShowInitials()) {
      <div class="avatar-initials">{{ initials() }}</div>
    } @else {
      <svg
        class="avatar-default-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor">
        <path
          d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
      </svg>
    }

    @if (showOnlineStatus()) {
      <span
        class="online-status"
        [class.online]="isOnline()"
        [class.offline]="!isOnline()"
        [attr.aria-label]="isOnline() ? 'Online' : 'Offline'"></span>
    }
  </div>
}
